name: scry
channels:
    - conda-forge
dependencies:
    - python=3.14
    - python-magic   # MIME/magic detection for the dispatcher
    - pytest
    - pip
    - pyyaml

    - pip:
       - python-dotenv

# Base CLI tools (install via system package manager, not conda):
#   exiftool   -> brew install exiftool
#   poppler    -> brew install poppler   (provides pdfinfo + pdftotext)
